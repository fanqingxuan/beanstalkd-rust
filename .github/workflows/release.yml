name: Build release packages

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            archive: tar.gz
            exe: ""
          - name: macos-aarch64
            os: macos-latest
            archive: tar.gz
            exe: ""
          - name: windows-x86_64
            os: windows-latest
            archive: zip
            exe: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --workspace --locked

      - name: Build
        run: cargo build --release --workspace --locked

      - name: Package Unix
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          package="beanstalkd-${{ matrix.name }}"
          mkdir -p "dist/${package}"
          cp "target/release/beanstalkd${{ matrix.exe }}" "dist/${package}/"
          cp "target/release/beanstalkctl${{ matrix.exe }}" "dist/${package}/"
          cp README.md README.zh-CN.md "dist/${package}/"
          tar -C dist -czf "dist/${package}.tar.gz" "${package}"

      - name: Package Windows
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $package = "beanstalkd-${{ matrix.name }}"
          New-Item -ItemType Directory -Force -Path "dist/$package" | Out-Null
          Copy-Item "target/release/beanstalkd${{ matrix.exe }}" "dist/$package/"
          Copy-Item "target/release/beanstalkctl${{ matrix.exe }}" "dist/$package/"
          Copy-Item README.md, README.zh-CN.md "dist/$package/"
          Compress-Archive -Path "dist/$package" -DestinationPath "dist/$package.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: beanstalkd-${{ matrix.name }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

      - name: Upload GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
